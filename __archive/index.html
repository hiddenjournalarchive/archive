<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archive Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-panel { max-width: 800px; margin: 4rem auto; padding: 2rem; background: var(--paper-color); border: 1px solid var(--border-color); border-radius: 4px; }
        .flex { display: flex; gap: 1rem; }
        textarea { height: 400px; resize: vertical; }
        .danger { border-color: red; color: red; }
        .danger:hover { background: red; color: white; }
        #auth-section { text-align: center; padding: 4rem 0; }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h1 class="mono">Writer's Desk.</h1>
        
        <div id="auth-section">
            <p>Enter your GitHub Personal Access Token to unlock.</p>
            <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
            <button onclick="admin.login()">Unlock</button>
        </div>

        <div id="editor-section" style="display: none;">
            <div class="flex" style="margin-bottom: 2rem;">
                <select id="fileSelect" onchange="admin.loadFile()"><option value="new">+ New Entry</option></select>
                <button onclick="admin.logout()">Lock Desk</button>
            </div>

            <div class="flex">
                <input type="date" id="eDate">
                <input type="text" id="eTags" placeholder="Tags (comma separated)">
                <input type="text" id="eMood" placeholder="Mood">
            </div>
            <textarea id="eBody" placeholder="Start writing in markdown..."></textarea>
            
            <div class="flex" style="justify-content: space-between;">
                <button onclick="admin.saveFile()" id="saveBtn">Save Entry</button>
                <button onclick="admin.deleteFile()" class="danger" id="deleteBtn" style="display:none;">Delete Entry</button>
            </div>
            <p id="status" class="mono" style="margin-top: 1rem;"></p>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
